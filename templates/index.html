<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PS Grade Tracker</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="container">
    <div class="card login-card">
      <h1>Grade Tracker</h1>
      <p class="subtitle">Sign in with your PowerSchool credentials</p>

      {% if error %}
        <div class="error-banner">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/login">
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Your PowerSchool username" required autofocus />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Your PowerSchool password" required />
        </div>
        <button type="submit" class="btn-primary">View My Grades</button>
      </form>

      <p class="note">Your credentials are only used to fetch your grades and are never stored.</p>
    </div>
  </div>
</body>
</html>
